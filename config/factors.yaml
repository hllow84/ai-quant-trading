# Factor registry: name -> source, signal model, optimization grid
# alpha_story is REQUIRED for every factor before any backtest.
# No credible mechanism stated here = no backtest run. This is the gate (spec §9.1).

synthetic_test:
  alpha_story: |
    Synthetic factor for pipeline smoke-test only. This is a random AR(1) series
    with no real alpha mechanism. Its sole purpose is to verify end-to-end CLI
    wiring and report generation without network calls.
    Do not treat any result from this factor as economically meaningful.
  source: synthetic
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 50
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [30, 50, 80]

coinbase_premium_gap:
  alpha_story: |
    The Coinbase premium gap is the spread between BTC/USD on Coinbase (US retail and
    institutional spot) and BTC/USDT on Binance (global perpetual reference price).
    Mechanism: when US-side buying pressure exceeds cross-venue arbitrage capacity,
    Coinbase price rises above Binance. Arbitrageurs close the spread by transferring
    BTC from Binance to Coinbase, which tends to coincide with, and slightly precede,
    a short-term up-move in the global reference price.
    Who is on the other side: statistical arbitrageurs and market-makers exploiting the
    spread; retail traders on Coinbase paying a premium for immediacy.
    Why the edge persists: on-chain BTC transfers take 10-60 minutes; stablecoin
    liquidity on Coinbase is shallower than Binance, limiting instantaneous arb.
    Expected value: mean-reversion of extreme spikes (|premium| > 2 sigma) within
    2-6 hours on 1h bars.
    Expected decay horizon: 6-18 months of active trading before arb infrastructure
    compresses the edge materially.
  source: ccxt_spread
  symbol_a: BTC/USDT
  venue_a: binance
  symbol_b: BTC/USD
  venue_b: coinbase
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 168
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]

perpetual_funding_rate:
  alpha_story: |
    Perpetual swap funding rates reflect the cost of holding leveraged directional
    exposure. When the market is net-long and bullish, longs pay shorts (positive
    funding); when net-short, shorts pay longs (negative funding). Extreme positive
    funding signals overcrowded longs: carry cost erodes long P&L, eventually forcing
    de-leveraging and mean-reversion. Extreme negative funding signals the reverse.
    Who is on the other side: leveraged trend-followers and momentum traders paying
    the funding bill; hedgers on the short side receiving it.
    Why the edge should persist: funding reflects a real cash transfer every 8 hours,
    so the signal is grounded in economics, not just price. Crowded positioning unwinds
    mechanically when carry cost exceeds expected gain.
    Expected value: contrarian mean-reversion after extreme funding spikes (|z| > 2),
    with a holding horizon of 8-48 hours (1-6 funding intervals).
    Expected decay horizon: 12-24 months; arb funds explicitly farm funding extremes,
    compressing the edge as AUM grows.
  source: ccxt_funding
  symbol: BTC/USDT:USDT
  venue: binance
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 168
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]

funding_rate_regime_cond:
  alpha_story: |
    Same base mechanism as perpetual_funding_rate: extreme perpetual funding
    spikes signal overcrowded positions that mean-revert as carry costs force
    de-levering. Hypothesis extension: the edge is conditional on a high realized-
    volatility regime. When volatility is elevated — realized vol in the top 50%
    of its rolling 336-bar history — crowded longs face larger mark-to-market
    losses and are forced to de-lever faster. The reversion is stronger and faster.
    In low-volatility regimes the carry cost is tolerable relative to the trend;
    longs are not forced out; the mean-reversion signal dissolves.
    Observable regime trigger: rolling 336-bar realized volatility of BTC/USDT
    1-hour returns, ranked against its own 336-bar rolling percentile history.
    Gate opens when that rank >= 0.50 (current vol above the median of recent history).
    All regime inputs are past-only and lagged >=1 bar. No calendar date or fold
    index is used anywhere in the regime construction.
    The real test: if the regime gate correlates strongly with which calendar
    periods fall inside the walk-forward folds, it is a calendar proxy, not a
    genuine conditional strategy, and must be killed regardless of Sharpe.
  source: ccxt_funding
  symbol: BTC/USDT:USDT
  venue: binance
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: regime_conditional
  signal_params:
    z_entry: 1.5
    z_exit: 0.5
    window: 336
    rv_window: 336
    rv_quantile: 0.5
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]

price_momentum_daily:
  alpha_story: |
    Same mechanism as price_momentum (1h): trend continuation from slow
    information diffusion and momentum-chasing behavior on BTC/USDT.

    This is a diagnostic run, not a new hypothesis. The five 1h kills
    (coinbase_premium_gap, perpetual_funding_rate, funding_rate_regime_cond,
    futures_basis, price_momentum) could reflect either (a) the factor
    mechanisms themselves lack edge, or (b) 1h resolution is the confound —
    noise dominates signal at hourly granularity, and 12bp fixed costs eat any
    marginal edge in a short holding window. This test isolates which.

    At daily (1d) resolution the signal-to-noise ratio is higher: each bar
    integrates 24h of price discovery. The holding period for a full MA-cross
    cycle is 5-30 bars = 1-4 weeks. The 12bp round-trip cost is amortized over
    a longer hold, reducing cost-per-day from 12bp (1h turnover) toward 0.5bp.

    Counter-argument: daily crypto momentum is well-documented in academic
    literature (Liu, Tsyvinski & Wu 2019; Borri 2019; Cong et al 2021). Every
    institutional crypto fund runs daily trend signals. The edge at daily
    resolution has had years to be arbed by participants with near-zero costs.

    The diagnostic question: if daily kills, the five 1h kills generalize across
    timeframe — the factor mechanisms themselves lack edge, and on-chain data is
    the justified next spend. If daily shows structure, resolution was the
    confound and we have free daily factors to work before spending on Glassnode.

    Model: mean_drift (fast/slow MA cross). MA windows scaled to daily
    equivalents: fast [5, 10, 20] days, slow [30, 60, 120] days.
  source: ccxt_ohlcv
  asset: BTC/USDT
  venue: binance
  timeframe: "1d"
  direction: both
  point_in_time_clean: true
  signal_model: mean_drift
  signal_params:
    fast: 10
    slow: 60
  bars_per_year: 365
  train_bars: 500
  test_bars: 90
  step_bars: 90
  embargo_bars: 10
  optimize:
    fast: [5, 10, 20]
    slow: [30, 60, 120]

price_momentum:
  alpha_story: |
    Price momentum on hourly BTC: trend continuation from slow information
    diffusion and momentum-chasing behavior.

    Mechanism: when a genuine catalyst (macro news, ETF inflows, protocol event)
    hits the market, not all participants react simultaneously. Slower participants
    — retail, family offices, smaller funds — receive, process, and act on
    information over hours to days rather than milliseconds. This creates a
    predictable drift in the direction of the initial move. Compounding this,
    trend-following systematic strategies and discretionary momentum traders
    explicitly buy strength and sell weakness, creating a self-reinforcing
    dynamic in the short run. Leveraged longs facing margin calls in a downtrend
    also create forced selling that continues the trend past the point where
    fundamentals justify it.

    Who is on the other side: (1) mean-reversion market-makers who provide
    liquidity and lose directionally when a trend materializes; (2) value-oriented
    investors buying into weakness; (3) the general pool of liquidity providers
    who take the other side of trend trades at the quoted spread.

    Why it might persist: behavioral biases (anchoring, herding) are stable human
    traits. Forced liquidations from over-leveraged positions amplify trends beyond
    rational levels. Regulatory fragmentation slows capital allocation globally.

    Honest prior: price momentum is the most crowded, most documented factor in
    finance. The 12-1 month anomaly has been in academic literature since Jegadeesh
    and Titman (1993). Crypto-specific momentum is covered in every factor survey
    since 2018. Free OHLCV at 1h resolution is available to every participant on
    Earth. Every quant trading firm has run MA-cross momentum on hourly crypto data.
    The prior probability of finding a genuine, cost-inclusive edge on free 1h data
    is very low — this is the closing test on the free price/derivatives surface.

    Model matched to mechanism: mean_drift (fast/slow MA cross), not spike_capture.
    Momentum is a drift signal — a sustained directional tendency — not a spike-and-
    revert. MA cross is the canonical operator for detecting sustained drift.
  source: ccxt_ohlcv
  asset: BTC/USDT
  venue: binance
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: mean_drift
  signal_params:
    fast: 24
    slow: 168
  optimize:
    fast: [12, 24, 48]
    slow: [72, 168, 336]

futures_basis:
  alpha_story: |
    The futures basis (perpetual close - spot close) captures real-time leveraged
    demand imbalance. When perp trades above spot, longs are paying a premium to hold
    leveraged exposure; when below, shorts are crowded and paying a discount.

    Mechanism: an elevated positive basis (longs crowded) closes via three simultaneous
    pressures. First, arbitrageurs buy spot and sell perp, purchasing against the trend.
    Second, the 8h funding settlement forces longs to pay a cash carry cost proportional
    to the basis itself, eroding their position economics. Third, over-leveraged longs
    face liquidation cascades when the basis widens beyond their margin threshold.
    All three forces apply simultaneously and self-reinforce — the wider the basis, the
    stronger the reversion pressure. Mirror logic applies for negative basis.

    Who is on the other side: momentum-driven leveraged traders chasing directional
    moves on the perp; retail speculators who prefer the perp for instant leverage
    access and accept any premium to open; and arb bots (who are self-correcting —
    their activity closes the edge, but they exhaust their capital at large spikes).

    Why the edge persists at extremes: arb capacity is bounded by balance-sheet
    constraints, counterparty limits, and settlement latency between spot and perp.
    At large basis spikes (e.g. 1%+ premium), the risk-adjusted return to the arb
    deteriorates quickly: the arb requires holding two legs simultaneously with
    margin on each, and any directional move that widens the basis before it closes
    causes mark-to-market losses. Retail demand sustains the premium past efficient
    arb levels for hours to days.

    Distinction from perpetual_funding_rate: basis is priced continuously at every
    1h bar — it measures current crowding pressure directly. Funding rate is sampled
    at 8h settlement intervals and is the exchange mechanism to anchor perp to spot.
    The basis is the raw imbalance signal; the funding rate is the lagged correction.
    Both reflect the same underlying market structure but basis has 8x more observations
    per trading day.

    Expected decay: 12-24 months as cross-venue arb infrastructure scales. Data
    quality is unimpeachable (5-year OHLCV cache, no revision risk, no look-ahead).
    This is a clean re-approach to the carry mechanism visible in perpetual_funding_rate,
    on data deep enough to validate properly.
  source: ccxt_spread
  symbol_a: BTC/USDT
  venue_a: binance
  symbol_b: BTC/USDT:USDT
  venue_b: binance
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 168
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]
