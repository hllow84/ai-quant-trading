# Factor registry: name -> source, signal model, optimization grid
# alpha_story is REQUIRED for every factor before any backtest.
# No credible mechanism stated here = no backtest run. This is the gate (spec §9.1).

synthetic_test:
  alpha_story: |
    Synthetic factor for pipeline smoke-test only. This is a random AR(1) series
    with no real alpha mechanism. Its sole purpose is to verify end-to-end CLI
    wiring and report generation without network calls.
    Do not treat any result from this factor as economically meaningful.
  source: synthetic
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 50
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [30, 50, 80]

coinbase_premium_gap:
  alpha_story: |
    The Coinbase premium gap is the spread between BTC/USD on Coinbase (US retail and
    institutional spot) and BTC/USDT on Binance (global perpetual reference price).
    Mechanism: when US-side buying pressure exceeds cross-venue arbitrage capacity,
    Coinbase price rises above Binance. Arbitrageurs close the spread by transferring
    BTC from Binance to Coinbase, which tends to coincide with, and slightly precede,
    a short-term up-move in the global reference price.
    Who is on the other side: statistical arbitrageurs and market-makers exploiting the
    spread; retail traders on Coinbase paying a premium for immediacy.
    Why the edge persists: on-chain BTC transfers take 10-60 minutes; stablecoin
    liquidity on Coinbase is shallower than Binance, limiting instantaneous arb.
    Expected value: mean-reversion of extreme spikes (|premium| > 2 sigma) within
    2-6 hours on 1h bars.
    Expected decay horizon: 6-18 months of active trading before arb infrastructure
    compresses the edge materially.
  source: ccxt_spread
  symbol_a: BTC/USDT
  venue_a: binance
  symbol_b: BTC/USD
  venue_b: coinbase
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 168
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]

perpetual_funding_rate:
  alpha_story: |
    Perpetual swap funding rates reflect the cost of holding leveraged directional
    exposure. When the market is net-long and bullish, longs pay shorts (positive
    funding); when net-short, shorts pay longs (negative funding). Extreme positive
    funding signals overcrowded longs: carry cost erodes long P&L, eventually forcing
    de-leveraging and mean-reversion. Extreme negative funding signals the reverse.
    Who is on the other side: leveraged trend-followers and momentum traders paying
    the funding bill; hedgers on the short side receiving it.
    Why the edge should persist: funding reflects a real cash transfer every 8 hours,
    so the signal is grounded in economics, not just price. Crowded positioning unwinds
    mechanically when carry cost exceeds expected gain.
    Expected value: contrarian mean-reversion after extreme funding spikes (|z| > 2),
    with a holding horizon of 8-48 hours (1-6 funding intervals).
    Expected decay horizon: 12-24 months; arb funds explicitly farm funding extremes,
    compressing the edge as AUM grows.
  source: ccxt_funding
  symbol: BTC/USDT:USDT
  venue: binance
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: spike_capture
  signal_params:
    z_entry: 2.0
    z_exit: 0.5
    window: 168
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]

funding_rate_regime_cond:
  alpha_story: |
    Same base mechanism as perpetual_funding_rate: extreme perpetual funding
    spikes signal overcrowded positions that mean-revert as carry costs force
    de-levering. Hypothesis extension: the edge is conditional on a high realized-
    volatility regime. When volatility is elevated — realized vol in the top 50%
    of its rolling 336-bar history — crowded longs face larger mark-to-market
    losses and are forced to de-lever faster. The reversion is stronger and faster.
    In low-volatility regimes the carry cost is tolerable relative to the trend;
    longs are not forced out; the mean-reversion signal dissolves.
    Observable regime trigger: rolling 336-bar realized volatility of BTC/USDT
    1-hour returns, ranked against its own 336-bar rolling percentile history.
    Gate opens when that rank >= 0.50 (current vol above the median of recent history).
    All regime inputs are past-only and lagged >=1 bar. No calendar date or fold
    index is used anywhere in the regime construction.
    The real test: if the regime gate correlates strongly with which calendar
    periods fall inside the walk-forward folds, it is a calendar proxy, not a
    genuine conditional strategy, and must be killed regardless of Sharpe.
  source: ccxt_funding
  symbol: BTC/USDT:USDT
  venue: binance
  asset: BTC/USDT
  timeframe: "1h"
  direction: both
  point_in_time_clean: true
  signal_model: regime_conditional
  signal_params:
    z_entry: 1.5
    z_exit: 0.5
    window: 336
    rv_window: 336
    rv_quantile: 0.5
  optimize:
    z_entry: [1.5, 2.0, 2.5]
    window: [72, 168, 336]
